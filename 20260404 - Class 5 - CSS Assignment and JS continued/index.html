<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./style.css">
        <title>Document</title>
    </head>
    <body>
        <header class="header">
            <div class="header__logo">
                <img src="./assets/zerodha-logo.svg" alt="Zerodha Logo">
            </div>
            <nav class="header__nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="#">Signup</a></li>
                    <li class="nav__item"><a href="#">About</a></li>
                    <li class="nav__item"><a href="#">Product</a></li>
                    <li class="nav__item"><a href="#">Pricing</a></li>
                    <li class="nav__item"><a href="#">Support</a></li>
                </ul>
            </nav>
        </header>
        <main class="main">
            <section class="landing-section">
                <img src="./assets/landing.svg" alt="Landing Image" class="landing-section__image">
                <div class="landing-section__content">
                    <h1 class="landing-section__heading">Invest in everything</h1>
                    <p class="landing-section__description">Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.</p>
                    <button class="landing-section__signup-button">Sign up for free</button>
                </div>
            </section>
        </main>
    </body>
</html>
